version: 2

sources:
  - name: staging_lending
    description: "Lending tables pulled from production into analytics_db staging landing."
    schema: staging
    tables:
      - name: lending_branches
        tests:
          - unique_combination_of_columns:
              columns: [branch_id, loaded_at]
        columns:
          - name: branch_id
            tests: [not_null]
          - name: branch_name
            tests: [not_null]
          - name: city
            tests: [not_null]

      - name: lending_customers
        tests:
          - unique_combination_of_columns:
              columns: [customer_id, loaded_at]
        columns:
          - name: customer_id
            tests: [not_null]
          - name: phone_number
            tests: [not_null]
          - name: full_name
            tests: [not_null]
          - name: primary_branch_id
            tests:
              - not_null
              - relationships:
                  to: source('staging_lending', 'lending_branches')
                  field: branch_id

      - name: lending_loan_applications
        columns:
          - name: application_id
            tests: [unique, not_null]
          - name: status
            tests:
              - not_null
              - accepted_values:
                  values: ["pending", "approved", "rejected"]
          - name: customer_id
            tests:
              - not_null
              - relationships:
                  to: source('staging_lending', 'lending_customers')
                  field: customer_id
          - name: branch_id
            tests:
              - relationships:
                  to: source('staging_lending', 'lending_branches')
                  field: branch_id

      - name: lending_loans
        columns:
          - name: loan_id
            tests: [unique, not_null]
          - name: status
            tests:
              - not_null
              - accepted_values:
                  values: ["active", "closed", "defaulted"]
          - name: customer_id
            tests:
              - not_null
              - relationships:
                  to: source('staging_lending', 'lending_customers')
                  field: customer_id
          - name: branch_id
            tests:
              - not_null
              - relationships:
                  to: source('staging_lending', 'lending_branches')
                  field: branch_id
          - name: application_id
            tests:
              - relationships:
                  to: source('staging_lending', 'lending_loan_applications')
                  field: application_id

      - name: lending_repayments
        columns:
          - name: repayment_id
            tests: [unique, not_null]
          - name: status
            tests:
              - accepted_values:
                  values: ["completed", "failed"]
          - name: loan_id
            tests:
              - not_null
              - relationships:
                  to: source('staging_lending', 'lending_loans')
                  field: loan_id

  - name: staging_insurance
    description: "Insurance tables pulled from production into analytics_db staging landing."
    schema: staging
    tables:
      - name: insurance_policy_holders
        tests:
          - unique_combination_of_columns:
              columns: [policy_holder_id, loaded_at]
        columns:
          - name: policy_holder_id
            tests: [not_null]
          - name: phone_number
            tests: [not_null]
          - name: full_name
            tests: [not_null]

      - name: insurance_policies
        columns:
          - name: policy_id
            tests: [unique, not_null]
          - name: policy_number
            tests: [unique, not_null]
          - name: status
            tests:
              - accepted_values:
                  values: ["active", "lapsed", "cancelled"]
          - name: policy_holder_id
            tests:
              - not_null
              - relationships:
                  to: source('staging_insurance', 'insurance_policy_holders')
                  field: policy_holder_id

      - name: insurance_claims
        columns:
          - name: claim_id
            tests: [unique, not_null]
          - name: status
            tests:
              - accepted_values:
                  values: ["open", "approved", "denied", "closed"]
          - name: policy_id
            tests:
              - not_null
              - relationships:
                  to: source('staging_insurance', 'insurance_policies')
                  field: policy_id
