version: 2

semantic_models:
  - name: branch_monthly_performance
    model: ref('mart_branch_monthly_performance')
    description: >
      Branch × calendar month grain. Insurance-derived measures only include customers
      resolved to lending with a non-null primary_branch_id (see data product doc).
    defaults:
      agg_time_dimension: month_start_date
    entities:
      - name: branch_month
        type: primary
        expr: branch_month_sk
    dimensions:
      - name: month_start_date
        type: time
        type_params:
          time_granularity: month
      - name: branch_id
        type: categorical
    measures:
      - name: loan_disbursement_amount
        description: Sum of loan principal disbursed in the branch-month
        agg: sum
        expr: loan_disbursement_amount
      - name: number_of_loans
        description: Count of loans disbursed in the branch-month
        agg: sum
        expr: number_of_loans
      - name: repayment_amount
        description: Sum of completed repayments attributed to the branch-month
        agg: sum
        expr: repayment_amount
      - name: active_policy_count
        description: Distinct active policies overlapping the month (branch-attributed)
        agg: sum
        expr: active_policy_count
      - name: claim_amount
        description: Sum of claim amounts filed in the month (branch-attributed)
        agg: sum
        expr: claim_amount
      - name: cross_sell_customer_count
        description: Distinct customers with both disbursement and active policy in the branch-month
        agg: sum
        expr: cross_sell_customer_count

metrics:
  - name: total_loan_disbursement_amount
    label: Total loan disbursement amount
    type: simple
    type_params:
      measure: loan_disbursement_amount
    description: Sum of loan_disbursement_amount across selected branch-months

  - name: total_repayment_amount
    label: Total repayment amount
    type: simple
    type_params:
      measure: repayment_amount
    description: Sum of repayment_amount (completed repayments) across selected branch-months

  - name: total_active_policies
    label: Total active policy slots (branch-month)
    type: simple
    type_params:
      measure: active_policy_count
    description: Sum of active_policy_count; interpret at branch × month grain

  - name: total_number_of_loans
    label: Total number of loans
    type: simple
    type_params:
      measure: number_of_loans
    description: Sum of number_of_loans across selected branch-months

  - name: total_claim_amount
    label: Total claim amount
    type: simple
    type_params:
      measure: claim_amount
    description: Sum of claim_amount across selected branch-months

  - name: total_cross_sell_customers
    label: Total cross-sell customers
    type: simple
    type_params:
      measure: cross_sell_customer_count
    description: Sum of cross_sell_customer_count across selected branch-months

  - name: repayment_coverage_ratio
    label: Repayment coverage ratio
    type: derived
    type_params:
      expr: total_repayment_amount / nullif(total_loan_disbursement_amount, 0)
      metrics:
        - name: total_repayment_amount
        - name: total_loan_disbursement_amount
    description: Repayment amount as a share of disbursement amount in the selected slice

  - name: claim_to_disbursement_ratio
    label: Claim-to-disbursement ratio
    type: derived
    type_params:
      expr: total_claim_amount / nullif(total_loan_disbursement_amount, 0)
      metrics:
        - name: total_claim_amount
        - name: total_loan_disbursement_amount
    description: Claim amount as a share of disbursement amount in the selected slice

  - name: avg_disbursement_per_loan
    label: Average disbursement per loan
    type: derived
    type_params:
      expr: total_loan_disbursement_amount / nullif(total_number_of_loans, 0)
      metrics:
        - name: total_loan_disbursement_amount
        - name: total_number_of_loans
    description: Weighted average disbursement size computed from totals

  - name: cross_sell_per_loan_ratio
    label: Cross-sell customers per loan
    type: derived
    type_params:
      expr: total_cross_sell_customers / nullif(total_number_of_loans, 0)
      metrics:
        - name: total_cross_sell_customers
        - name: total_number_of_loans
    description: Cross-sell customer count normalized by number of loans in the selected slice
