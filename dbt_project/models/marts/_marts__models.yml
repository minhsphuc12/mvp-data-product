version: 2

models:
  - name: dim_date
    description: "Calendar dimension generated from a contiguous date spine."
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_key
        tests: [unique, not_null]
      - name: date_day
        granularity: day
        tests: [unique, not_null]

  - name: dim_branch
    description: "Branch conformed SCD2 dimension (lending is the system of record)."
    tests:
      - no_overlapping_scd2_windows:
          business_key: branch_id
          valid_from: valid_from_ts
          valid_to: valid_to_ts
      - unique_combination_of_columns:
          columns: [branch_id, valid_from_ts]
    columns:
      - name: branch_key
        tests: [unique, not_null]
      - name: branch_id
        tests: [not_null]
      - name: valid_from_ts
        tests: [not_null]
      - name: is_current
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: version_number
        tests: [not_null]

  - name: dim_customer
    description: "Customer SCD2 dimension keyed by resolved master_customer_id."
    tests:
      - no_overlapping_scd2_windows:
          business_key: master_customer_id
          valid_from: valid_from_ts
          valid_to: valid_to_ts
      - unique_combination_of_columns:
          columns: [master_customer_id, valid_from_ts]
    columns:
      - name: customer_key
        tests: [unique, not_null]
      - name: master_customer_id
        tests: [not_null]
      - name: valid_from_ts
        tests: [not_null]
      - name: is_current
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: version_number
        tests: [not_null]

  - name: fct_loan_disbursement
    description: "One row per loan disbursement (loan_id grain)."
    config:
      indexes:
        - columns: [loan_id]
          unique: true
        - columns: [customer_key]
        - columns: [disbursement_date_key]
        - columns: [branch_key, disbursement_date_key]
    columns:
      - name: loan_id
        tests: [unique, not_null]
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: branch_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_branch')
              field: branch_key
      - name: disbursement_date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

  - name: fct_repayment
    description: "One row per repayment event."
    config:
      indexes:
        - columns: [repayment_id]
          unique: true
        - columns: [loan_id]
        - columns: [customer_key]
        - columns: [payment_date_key]
        - columns: [branch_key, payment_date_key]
    columns:
      - name: repayment_id
        tests: [unique, not_null]
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key

  - name: fct_policy
    description: "One row per insurance policy."
    config:
      indexes:
        - columns: [policy_id]
          unique: true
        - columns: [customer_key]
        - columns: [coverage_start_date_key]
        - columns: [coverage_end_date_key]
        - columns: [policy_holder_id]
    columns:
      - name: policy_id
        tests: [unique, not_null]

  - name: fct_claim
    description: "One row per claim."
    config:
      indexes:
        - columns: [claim_id]
          unique: true
        - columns: [policy_id]
        - columns: [customer_key]
        - columns: [filed_date_key]
    columns:
      - name: claim_id
        tests: [unique, not_null]

  - name: mart_branch_monthly_performance
    description: "Executive-style branch × month rollups."
    columns:
      - name: branch_month_sk
        tests: [unique, not_null]
      - name: branch_id
        tests: [not_null]
      - name: month_start_date
        tests: [not_null]
